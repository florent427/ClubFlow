name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # AUTO-MERGE de la PR de release dès qu'elle est ouverte (squash, sans review).
      # → tag git + GitHub Release créés automatiquement → deploy.yml déclenché.
      - name: Auto-merge release PR
        if: ${{ steps.release.outputs.pr != '' }}
        run: |
          PR_NUMBER=$(echo '${{ steps.release.outputs.pr }}' | jq -r '.number')
          echo "Auto-merging release PR #$PR_NUMBER"
          gh pr merge "$PR_NUMBER" --squash --auto --delete-branch=false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
